<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Handling OIDC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f7f5;
            --fg: #1c1c1c;
            --muted: #6b6b6b;
            --rule: #e3e3de;
            --accent-processing: #1c1c1c;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .card {
            width: 100%;
            max-width: 640px;
            background: #ffffff;
            border: 1px solid var(--rule);
            padding: 48px 56px;
        }
        h1 {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 600;
            font-size: 22px;
            line-height: 1.35;
            margin: 0 0 20px;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 .status-icon {
            font-size: 24px;
            line-height: 1;
            flex-shrink: 0;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: 2.5px solid #d0d0d0;
            border-top-color: var(--accent-processing);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%  { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        .subtitle {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 400;
            font-size: 16px;
            color: var(--muted);
            margin: 0 0 20px;
        }
        p {
            margin: 0 0 14px;
            color: #333;
        }
        p.muted { color: var(--muted); }
        code, kbd {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            background: #f2f2ee;
            padding: 2px 6px;
            word-break: break-all;
        }
        dl {
            margin: 24px 0 28px;
            padding: 20px 0;
            border-top: 1px solid var(--rule);
            border-bottom: 1px solid var(--rule);
            display: grid;
            grid-template-columns: auto 1fr;
            column-gap: 20px;
            row-gap: 10px;
        }
        dt {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            padding-top: 2px;
        }
        dd {
            margin: 0;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            word-break: break-all;
        }
        hr {
            border: none;
            border-top: 1px solid var(--rule);
            margin: 24px 0;
        }
        body.minimal {
            background: #ffffff;
        }
        body.minimal #root {
            text-align: center;
        }
        .minimal-block {
            text-align: center;
        }
        .minimal-block .mark {
            font-size: 48px;
            color: var(--muted);
            line-height: 1;
            margin-bottom: 16px;
        }
        .minimal-block .note {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="card">
            <h1><span class="spinner"></span>Authenticating<span class="dots"></span></h1>
            <p class="muted">Exchanging the authorization response with your identity provider.</p>
        </div>
    </div>
    <script>
        (function() {
            function signalAuthFailure(reason) {
                fetch('/auth/authfail', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason: reason })
                });
            }

            function escapeHtml(s) {
                return String(s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function render(html) {
                document.getElementById('root').innerHTML = html;
            }

            function showError(message) {
                render(`
                    <div class="card">
                        <h1><span class="status-icon">&#x274C;</span>Failed</h1>
                        <p class="subtitle">Authentication failed</p>
                        <p>${escapeHtml(message)}</p>
                        <hr>
                        <p class="muted">Additional debug information from your identity provider may be present in the address bar.</p>
                        <p class="muted">You may now close this window and try again.</p>
                    </div>`);
            }

            function showSuccess() {
                render(`
                    <div class="card">
                        <h1><span class="status-icon">&#x2705;</span>Authenticated</h1>
                        <p class="subtitle">Role assumed successfully</p>
                        <p>Your AWS credentials have been written to the profile below.</p>
                        <dl>
                            <dt>Role</dt>
                            <dd>{{role_arn}}</dd>
                            <dt>File</dt>
                            <dd>{{aws_config_file}}</dd>
                            <dt>Profile</dt>
                            <dd>{{profile_to_update}}</dd>
                        </dl>
                        <p>Use this profile with the AWS CLI by passing <code>--profile {{profile_to_update}}</code>.</p>
                        <p class="muted">For the AWS SDK, refer to your SDK documentation on specifying a named profile. You may now close this window.</p>
                    </div>`);
                window.location.hash = '';
                document.title = '\u2713 Done - entraws';
                setTimeout(function () {
                    render(`
                        <div class="minimal-block">
                            <div class="mark">&#x2713;</div>
                            <div class="note">You may now close this tab</div>
                        </div>`);
                    document.body.classList.add('minimal');
                }, 3000);
            }

            function handleError(response) {
                if (!response.ok) {
                    return response.json().then(errorData => {
                        throw new Error(errorData.message || 'Authentication failed');
                    });
                }
                return response.json();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                console.log("Detected authorization code flow");
                const receivedState = urlParams.get('state');
                if (!receivedState || receivedState !== '{{pkce_state}}') {
                    showError('Invalid state parameter');
                    signalAuthFailure('invalid_state');
                    return;
                }

                fetch('/process_token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: code,
                        state: receivedState,
                        grant_type: 'authorization_code'
                    })
                })
                .then(handleError)
                .then(data => {
                    if (data.status === 'success') {
                        showSuccess();
                    } else {
                        showError(data.message || 'Unknown error occurred');
                        signalAuthFailure('unknown_error');
                    }
                })
                .catch(error => {
                    showError(error.message || 'Failed to process authentication');
                    signalAuthFailure('unknown_error');
                });
            } else {
                const hash = window.location.hash.substr(1);
                const result = hash.split('&').reduce((result, item) => {
                    const [key, value] = item.split('=');
                    result[key] = decodeURIComponent(value);
                    return result;
                }, {});

                if (!result.state || result.state !== '{{pkce_state}}') {
                    showError('Invalid state parameter');
                    signalAuthFailure('invalid_state');
                    return;
                }
                if (result.id_token) {
                    console.log("Detected implicit flow");

                    fetch('/process_token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id_token: result.id_token,
                            state: result.state,
                            grant_type: 'implicit'
                        })
                    })
                    .then(handleError)
                    .then(data => {
                        if (data.status === 'success') {
                            showSuccess();
                        } else {
                            showError(data.message || 'Unknown error occurred');
                            signalAuthFailure('unknown_error');
                        }
                    })
                    .catch(error => {
                        showError(error.message || 'Failed to process authentication');
                        signalAuthFailure('unknown_error');
                    });
                } else {
                    showError('No code or token found in response');
                    signalAuthFailure('no_token');
                }
            }
        })();
    </script>
</body>
</html>
