name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # No build cache on the release job: a poisoned cache entry could be
      # baked into published binaries. Release builds are infrequent, so we
      # trade cache speed for artifact integrity (see zizmor cache-poisoning).
      - name: Upload binary to release
        uses: taiki-e/upload-rust-binary-action@10c1cf6a3da113ad4e60018e386570529aa5f1d3 # v1.30.0
        with:
          bin: entraws
          target: ${{ matrix.target }}
          archive: $bin-$target-$tag
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    # The build job creates the GitHub release; wait for it so the SBOM
    # upload has a release to attach to.
    needs: build
    permissions:
      # Needed to attach the SBOM to the release created by the build job.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      # Version-pinned + --locked install (no curl | bash). cargo-cyclonedx
      # reads Cargo.lock, so the SBOM reflects the exact released dependency set.
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      # cargo-cyclonedx reads Cargo.lock via cargo metadata, so the SBOM
      # reflects the exact released dependency set. Output: entraws.cdx.json
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" entraws.cdx.json --clobber
