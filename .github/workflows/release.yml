name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # Linux musl only: install the cross toolchain and linker so that a bare
      # `cargo build --target <musl>` links instead of failing on a missing
      # linker (aarch64-musl in particular). macOS targets need nothing here.
      - name: Setup cross toolchain (linux-musl only)
        if: runner.os == 'Linux'
        uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b # v1.41.0
        with:
          target: ${{ matrix.target }}

      # No build cache on the release job: a poisoned cache entry could be
      # baked into published binaries. Release builds are infrequent, so we
      # trade cache speed for artifact integrity (see zizmor cache-poisoning).
      #
      # setup-cross-toolchain-action sets CARGO_BUILD_TARGET on Linux, but
      # passing --target explicitly keeps the command identical on every OS.
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Stage a tarball plus a sha256 sidecar. shasum is available on both the
      # macOS and ubuntu runners.
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf \
            "dist/entraws-${{ matrix.target }}.tar.gz" entraws
          ( cd dist && shasum -a 256 "entraws-${{ matrix.target }}.tar.gz" \
            > "entraws-${{ matrix.target }}.tar.gz.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: entraws-${{ matrix.target }}
          path: dist/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # contents: write to create the release; id-token + attestations for
      # build provenance attestation of the published tarballs.
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      # Version-pinned install (no curl | bash). cargo-cyclonedx reads
      # Cargo.lock, so the SBOM reflects the exact released dependency set.
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@eea29cff9a2b68892c0845ae3e4f45fc47ee9354 # v2.75.13
        with:
          tool: cargo-cyclonedx@0.5.9

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      # cargo-cyclonedx reads Cargo.lock via cargo metadata, so the SBOM
      # reflects the exact released dependency set. Output: entraws.cdx.json
      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json --override-filename entraws
          mv entraws.json dist/entraws.cdx.json

      # Attest provenance for every published tarball so consumers can verify
      # the binaries were built by this workflow (gh attestation verify).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.tar.gz

      # gh release create makes the release for this tag in one shot after
      # every target has built, so there is no "release not found" race: the
      # binaries, sha256 sidecars, and SBOM are all uploaded together.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" dist/* --generate-notes
